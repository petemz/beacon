services:
  db:
    image: postgres:16
    container_name: rccg_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5440:5432" # Maps outer port 5440 to inner standard Postgres port 5432
    volumes:
      - rccg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USER:-postgres} -d $${DB_NAME:-rccg_postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rccg_data: