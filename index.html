<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beacon - Child Tracker</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-container {
      width: 100%;
      max-width: 380px;
    }
    .login-card {
      background: var(--bg-card);
      border-radius: 24px;
      padding: 32px 28px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .login-logo {
      position: relative;
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      margin-bottom: 22px;
    }
    .login-logo .pulse {
      position: absolute;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.16;
      animation: beaconPulse 2.6s ease-out infinite;
    }
    .login-logo .dot {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px var(--bg);
    }
    .login-title {
      font-weight: 700;
      font-size: 24px;
      letter-spacing: -0.01em;
      line-height: 1.15;
      margin-bottom: 11px;
    }
    .login-desc {
      font-size: 13.5px;
      color: var(--text-muted);
      line-height: 1.55;
      margin-bottom: 26px;
    }
    .login-footer {
      font-size: 11.5px;
      color: #bdb7ad;
      text-align: center;
      margin-top: auto;
      padding-top: 24px;
      line-height: 1.5;
    }
    .back-link {
      align-self: flex-start;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      padding: 0 0 22px;
      font-family: inherit;
    }
    .otp-hint {
      font-size: 11.5px;
      color: #bdb7ad;
      margin-top: 13px;
    }
    .otp-hint b {
      color: var(--text-muted);
    }
    #stage-login, #stage-otp {
      display: flex;
      flex-direction: column;
    }
    .hidden { display: none !important; }

    /* Loading Spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .btn-loading {
      pointer-events: none;
      opacity: 0.8;
    }

    /* Landing link */
    .landing-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
    }
    .landing-link:hover {
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <!-- Stage 1: Phone Entry -->
      <div id="stage-login">
        <div class="login-logo">
          <span class="pulse"></span>
          <span class="dot"></span>
        </div>
        <div class="login-title">See your children,<br>live on the map</div>
        <p class="login-desc">Enter the phone number you registered at the desk. We'll text you a one-time code.</p>

        <label class="label">
          <span class="label-text">PHONE NUMBER</span>
          <input type="tel" id="phone-input" class="input input-mono" placeholder="+234 803 555 0142">
        </label>

        <button id="send-code-btn" class="btn btn-primary" style="margin-top: 18px; width: 100%;">Send code</button>

        <p class="login-footer">No password, no app. Works on a 2G connection.</p>
        <a href="landing.html" class="landing-link">&larr; What is Beacon?</a>
      </div>

      <!-- Stage 2: OTP Entry -->
      <div id="stage-otp" class="hidden">
        <button id="back-btn" class="back-link">&larr; Change number</button>
        <div class="login-title">Enter the code</div>
        <p class="login-desc">Sent by SMS to <b id="display-phone" class="font-mono" style="color: #3a352f;"></b></p>

        <div class="otp-container">
          <input type="text" maxlength="1" inputmode="numeric" class="otp-input" data-otp="0">
          <input type="text" maxlength="1" inputmode="numeric" class="otp-input" data-otp="1">
          <input type="text" maxlength="1" inputmode="numeric" class="otp-input" data-otp="2">
          <input type="text" maxlength="1" inputmode="numeric" class="otp-input" data-otp="3">
          <input type="text" maxlength="1" inputmode="numeric" class="otp-input" data-otp="4">
          <input type="text" maxlength="1" inputmode="numeric" class="otp-input" data-otp="5">
        </div>

        <p class="otp-hint">Demo: enter any 6 digits, or use <b>482913</b>.</p>

        <button id="verify-btn" class="btn" style="margin-top: 24px; width: 100%; padding: 13px 24px; font-size: 14px; background: #e4e0da; color: #a39d94; cursor: not-allowed;">Verify &amp; continue</button>
        <button id="resend-btn" class="btn btn-ghost" style="margin-top: 12px; width: 100%;">Resend code</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    const stageLogin = document.getElementById('stage-login');
    const stageOtp = document.getElementById('stage-otp');
    const phoneInput = document.getElementById('phone-input');
    const displayPhone = document.getElementById('display-phone');
    const sendCodeBtn = document.getElementById('send-code-btn');
    const backBtn = document.getElementById('back-btn');
    const verifyBtn = document.getElementById('verify-btn');
    const resendBtn = document.getElementById('resend-btn');
    const otpInputs = document.querySelectorAll('.otp-input');

    let currentPhone = '';

    // Check if already logged in
    const session = Beacon.getSession();
    if (session && session.verified) {
      window.location.href = 'dashboard.html';
    }

    // Initialize demo data
    Beacon.initDemoData();

    // Send code button
    sendCodeBtn.addEventListener('click', () => {
      currentPhone = phoneInput.value.trim() || '+234 803 555 0142';

      // Show loading state
      sendCodeBtn.classList.add('btn-loading');
      sendCodeBtn.innerHTML = '<span class="spinner"></span>Sending...';

      // Simulate sending (in production this would be an API call)
      setTimeout(() => {
        displayPhone.textContent = currentPhone;
        sendCodeBtn.classList.remove('btn-loading');
        sendCodeBtn.textContent = 'Send code';
        stageLogin.classList.add('hidden');
        stageOtp.classList.remove('hidden');
        otpInputs[0].focus();
      }, 1200);
    });

    // Back button
    backBtn.addEventListener('click', () => {
      stageOtp.classList.add('hidden');
      stageLogin.classList.remove('hidden');
      clearOtp();
    });

    // OTP input handling
    otpInputs.forEach((input, i) => {
      input.addEventListener('input', (e) => {
        const val = e.target.value.replace(/[^0-9]/g, '').slice(-1);
        e.target.value = val;
        if (val && i < 5) {
          otpInputs[i + 1].focus();
        }
        updateVerifyButton();
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && i > 0) {
          otpInputs[i - 1].focus();
        }
      });
    });

    function clearOtp() {
      otpInputs.forEach(input => input.value = '');
      updateVerifyButton();
    }

    function getOtp() {
      return Array.from(otpInputs).map(i => i.value).join('');
    }

    function updateVerifyButton() {
      const otp = getOtp();
      if (otp.length === 6) {
        verifyBtn.style.background = 'var(--accent)';
        verifyBtn.style.color = '#fff';
        verifyBtn.style.cursor = 'pointer';
      } else {
        verifyBtn.style.background = '#e4e0da';
        verifyBtn.style.color = '#a39d94';
        verifyBtn.style.cursor = 'not-allowed';
      }
    }

    // Verify button
    verifyBtn.addEventListener('click', () => {
      if (getOtp().length < 6) return;

      // Show loading state
      verifyBtn.classList.add('btn-loading');
      verifyBtn.innerHTML = '<span class="spinner"></span>Verifying...';
      verifyBtn.style.background = 'var(--accent)';
      verifyBtn.style.color = '#fff';

      // Simulate verification (in production this would be an API call)
      setTimeout(() => {
        // Store session
        Beacon.setSession({ phone: currentPhone, verified: true });

        // Redirect to dashboard
        window.location.href = 'dashboard.html';
      }, 1000);
    });

    // Resend button
    resendBtn.addEventListener('click', () => {
      resendBtn.classList.add('btn-loading');
      resendBtn.innerHTML = '<span class="spinner" style="border-color: rgba(0,0,0,0.1); border-top-color: var(--text-muted);"></span>Sending...';

      setTimeout(() => {
        clearOtp();
        resendBtn.classList.remove('btn-loading');
        resendBtn.textContent = 'Resend code';
        otpInputs[0].focus();
        Beacon.vibrateShort();
      }, 1000);
    });
  </script>
</body>
</html>
